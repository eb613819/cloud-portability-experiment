- name: Install Nginx and DNS tools
  apt:
    name:
      - nginx
      - dnsutils
    state: present
    update_cache: yes

- name: Deploy initial HTTP-only Nginx config
  template:
    src: nginx.conf1.j2
    dest: /etc/nginx/sites-available/wordpress

- name: Enable site
  file:
    src: /etc/nginx/sites-available/wordpress
    dest: /etc/nginx/sites-enabled/wordpress
    state: link

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Restart Nginx
  service:
    name: nginx
    state: restarted

- name: Wait for DNS propagation
  command: dig +short blog.evanbrooks.me
  register: dns_result
  until: dns_result.stdout == hostvars[groups['web_group'][0]]['ansible_host']
  retries: 30
  delay: 10
  changed_when: false

- name: Install Certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Obtain SSL certificate
  command: >
    certbot --nginx
    -d blog.evanbrooks.me
    --non-interactive
    --agree-tos
    --email admin@evanbrooks.me
    --redirect
  args:
    creates: /etc/letsencrypt/live/blog.evanbrooks.me/fullchain.pem

- name: Deploy final HTTPS Nginx config
  template:
    src: nginx.conf2.j2
    dest: /etc/nginx/sites-available/wordpress

- name: Restart Nginx
  service:
    name: nginx
    state: restarted